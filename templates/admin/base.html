{% extends 'admin/base.html' %}
{% load static %}

{% block responsive %}
{{ block.super }}


<link rel="stylesheet" type="text/css" href="{% static '/css/admin_bootstrap_text_danger.css' %}">

<link rel="stylesheet" type="text/css" href="{% static '/css/main.css' %}">

<script>
window.addEventListener('load', function () {
	// Only run this code on the admin landing page
	if (document.body.innerHTML.indexOf('Välkommen till OLLI Begreppstjänst Portalen') === -1) {
		return;
	}

	function change_link_anchor_text(data) {
		if (!data || typeof data.unreadcomments === 'undefined') return;

		// Find the first anchor whose text starts with 'Begrepp kommentarer' (case-insensitive)
		const anchors = Array.from(document.querySelectorAll('a'));
		const anchor = anchors.find(a => a.textContent && a.textContent.trim().toLowerCase().startsWith('begrepp kommentarer'));
		if (!anchor) return;

		// Remove any existing badge we added earlier
		const existing = anchor.querySelector('.oci-unread-badge');
		if (existing) existing.remove();

		if (Number(data.unreadcomments) > 0) {
			const count = Number(data.unreadcomments);
			const span = document.createElement('span');
			span.className = 'text-danger oci-unread-badge';
			span.style.marginLeft = '6px';
			span.textContent = `- ${count} ${count === 1 ? 'Oberarbetad kommentar' : 'Oberarbetade kommentarer'}`;
			anchor.appendChild(span);
		}
	}

	async function check_number_of_recent_comments() {
		try {
			const resp = await fetch("{% url 'unread_comments' %}", { credentials: 'same-origin' });
			if (!resp.ok) return;
			const data = await resp.json();
			change_link_anchor_text(data);
		} catch (e) {
			// Fail silently but log to console during development
			console.error('Error fetching unread comments', e);
		} finally {
			// Poll every 60 seconds
			setTimeout(check_number_of_recent_comments, 60000);
		}
	}

	// initial run
	check_number_of_recent_comments();
});
</script>
{% endblock responsive %}
