repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0    # Check latest version
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.2  # check latest
    hooks:
      - id: ruff
        args: [--fix]   # <-- automatically fix unused imports, etc.

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2   # use latest
    hooks:
      - id: mypy
        additional_dependencies:
          # add stubs you need; examples:
          - Django==4.2
          - types-requests
          - django-stubs
          - django-stubs-ext
        args: ["--disable-error-code=no-untyped-def","--disable-error-code=var-annotated","--config-file", "pyproject.toml"]
