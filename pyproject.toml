[tool.mypy]
python_version = "3.11"
# be as strict as you like; these catch incorrect returns/args well:
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
strict_equality = true


# Ensure mypy finds local stubs
# Django plugin disabled in pre-commit environment to avoid needing full project deps
ignore_missing_imports = true
mypy_path = ["types", "."]

# allow dataclass-like unannotated globals (e.g. Django model fields)
allow_untyped_globals = true

# Disable var-annotated for Django models
disable_error_codes = ["var-annotated"]

# Exclude generated migrations directory from mypy checks
exclude = "term_list/migrations/.*"

[tool.django-stubs]
# Point django-stubs at the settings module we use for tests/local dev
django_settings_module = "application.settings.local"
strict_settings = false
strict_model_abstract_attrs = false

[tool.ruff]
# don’t force annotations on Django models
extend-ignore = ["ANN001"]

[tool.ruff.per-file-ignores]
"term_list/models.py" = ["ANN001"]
